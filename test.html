<html lang="zh-CN" data-eusoft-scrollable-element="1"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信授权平台 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --primary-light: #a29bfe;
            --secondary-color: #fd79a8;
            --accent-color: #00cec9;
            --dark-color: #2d3436;
            --light-color: #f8f9fa;
            --success-color: #00b894;
            --error-color: #d63031;
            --warning-color: #fdcb6e;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--light-color);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            background: linear-gradient(135deg, #1e2a78 0%, #152075 30%, #000428 100%);
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(108, 92, 231, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(253, 121, 168, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(0, 206, 201, 0.3) 0%, transparent 40%);
            z-index: -1;
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            position: relative;
            animation: fadeIn 0.8s ease;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            text-align: center;
            padding: 30px 0 20px;
            color: white;
        }

        .logo-inner {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .logo i {
            font-size: 36px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 1px;
            background: linear-gradient(to right, white, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            background-color: rgba(255, 255, 255, 0.08);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .tab-button {
            flex: 1;
            padding: 18px 0;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
        }

        .tab-button:hover {
            color: white;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .tab-button.active {
            color: white;
            font-weight: 600;
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            border-radius: 3px 3px 0 0;
        }

        .form-container {
            padding: 30px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: white;
            font-size: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 16px 45px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            transition: var(--transition);
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.2);
            outline: none;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .code-input {
            display: flex;
            gap: 10px;
        }

        .code-input input {
            flex: 1;
        }

        .code-input button {
            padding: 0 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
        }

        .code-input button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .code-input button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .form-footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .form-footer a:hover {
            color: white;
            text-decoration: underline;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            z-index: 1;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            z-index: 1;
        }

        .password-toggle:hover {
            color: white;
        }

        .email-status {
            margin-top: 8px;
            font-size: 13px;
            display: none;
            padding-left: 5px;
        }

        .email-status.valid {
            color: var(--success-color);
            display: block;
        }

        .email-status.invalid {
            color: var(--error-color);
            display: block;
        }

        .loading-spinner {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-light);
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: translateY(-50%) rotate(360deg);
            }
        }

        /* 吐司提示样式 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            position: relative;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            color: white;
            display: flex;
            align-items: center;
            transform: translateX(150%);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            max-width: 300px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success {
            border-left: 4px solid var(--success-color);
        }

        .toast.error {
            border-left: 4px solid var(--error-color);
        }

        .toast.warning {
            border-left: 4px solid var(--warning-color);
        }

        .toast-icon {
            margin-right: 12px;
            font-size: 20px;
        }

        .toast.success .toast-icon {
            color: var(--success-color);
        }

        .toast.error .toast-icon {
            color: var(--error-color);
        }

        .toast.warning .toast-icon {
            color: var(--warning-color);
        }

        .toast-close {
            margin-left: 15px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .toast-close:hover {
            opacity: 1;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                max-width: 100%;
            }

            .form-container {
                padding: 25px 20px;
            }

            h2 {
                font-size: 22px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .logo-inner {
                width: 70px;
                height: 70px;
            }

            .logo i {
                font-size: 32px;
            }

            .tab-button {
                padding: 15px 0;
                font-size: 14px;
            }
            
            input {
                padding: 14px 40px;
            }
        }
    </style>

<body data-eusoft-scrollable-element="1">
    <!-- 粒子背景 -->
    <div id="particles-js" data-eusoft-scrollable-element="1"><canvas class="particles-js-canvas-el" width="1093" height="1118" style="width: 100%; height: 100%;"></canvas></div>
    
    <div class="container">
        <div class="logo">
            <div class="logo-inner">
                <i class="fab fa-weixin" data-eusoft-scrollable-element="1"></i>
            </div>
            <h1 data-eusoft-scrollable-element="1">微信授权平台</h1>
            <p>安全登录，便捷管理</p>
        </div>
        
        <div class="tabs">
            <button class="tab-button" onclick="switchTab('login')">登录</button>
            <button class="tab-button" onclick="switchTab('reset')">找回密码</button>
            <button class="tab-button" onclick="switchTab('register')">注册</button>
        </div>

        <div id="login-form" class="form-container" style="display: block;">
            <h2 data-eusoft-scrollable-element="1">欢迎回来</h2>
            <div class="form-group">
                <label for="login-email">邮箱</label>
                <div>
                    <i class="fas fa-envelope input-icon" data-eusoft-scrollable-element="1"></i>
                    <input type="email" id="login-email" placeholder="请输入邮箱">
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <div>
                    <i class="fas fa-lock input-icon" data-eusoft-scrollable-element="1"></i>
                    <input type="password" id="login-password" placeholder="请输入密码">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('login-password', this)" data-eusoft-scrollable-element="1"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="login-card">卡密</label>
                <div>
                    <i class="fas fa-key input-icon" data-eusoft-scrollable-element="1"></i>
                    <input type="text" id="login-card" placeholder="请输入卡密">
                </div>
            </div>
            <button class="btn-primary" onclick="login()">登 录</button>
            <div class="form-footer">
                <a href="#" onclick="switchTab('reset')">忘记密码?</a>
            </div>
        </div>

        <div id="reset-form" class="form-container" style="display: none;">
            <h2>找回密码</h2>
            <div class="form-group">
                <label for="reset-email">邮箱</label>
                <div>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="reset-email" placeholder="请输入邮箱">
                </div>
            </div>
            <div class="form-group">
                <label for="new-password">新密码</label>
                <div>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="new-password" placeholder="请输入新密码">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('new-password', this)"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="reset-code">验证码</label>
                <div class="code-input">
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-key input-icon"></i>
                        <input type="text" id="reset-code" placeholder="请输入验证码">
                    </div>
                    <button onclick="sendCode('reset')">获取验证码</button>
                </div>
            </div>
            <button class="btn-primary" onclick="resetPassword()">重置密码</button>
            <div class="form-footer">
                想起密码了? <a href="#" onclick="switchTab('login')">返回登录</a>
            </div>
        </div>

        <div id="register-form" class="form-container" style="display: none;">
            <h2>创建账户</h2>
            <div class="form-group">
                <label for="register-email">邮箱</label>
                <div>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="register-email" placeholder="请输入邮箱" oninput="checkEmailAvailability()">
                    <div class="loading-spinner" id="email-loading" style="display: none;"></div>
                </div>
                <div id="email-status" class="email-status valid">邮箱可用</div>
            </div>
            <div class="form-group">
                <label for="register-password">密码</label>
                <div>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="register-password" placeholder="请输入密码">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('register-password', this)"></i>
                </div>
            </div>
            <div class="form-group">
                <label for="register-code">验证码</label>
                <div class="code-input">
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-key input-icon"></i>
                        <input type="text" id="register-code" placeholder="请输入验证码">
                    </div>
                    <button onclick="sendCode('register')">获取验证码</button>
                </div>
            </div>
            <button class="btn-primary" onclick="register()">注 册</button>
            <div class="form-footer">
                已有账户? <a href="#" onclick="switchTab('login')">立即登录</a>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toast-container"></div>
    
    <!-- 粒子效果库 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        // 初始化粒子效果
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 80, density: { enable: true, value_area: 800 } },
                    color: { value: "#ffffff" },
                    shape: { type: "circle" },
                    opacity: { value: 0.5, random: true },
                    size: { value: 3, random: true },
                    line_linked: {
                        enable: true,
                        distance: 150,
                        color: "#ffffff",
                        opacity: 0.4,
                        width: 1
                    },
                    move: {
                        enable: true,
                        speed: 2,
                        direction: "none",
                        random: true,
                        straight: false,
                        out_mode: "out",
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: "canvas",
                    events: {
                        onhover: { enable: true, mode: "grab" },
                        onclick: { enable: true, mode: "push" },
                        resize: true
                    }
                },
                retina_detect: true
            });
        });

        // 密码显示/隐藏切换
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // 邮箱检测相关函数
        let emailCheckTimeout = null;

        async function checkEmailAvailability() {
            const email = document.getElementById('register-email').value.trim();
            const emailStatus = document.getElementById('email-status');
            const loadingSpinner = document.getElementById('email-loading');

            // 重置状态
            clearTimeout(emailCheckTimeout);
            emailStatus.className = 'email-status';

            // 显示加载动画
            loadingSpinner.style.display = 'block';

            // 防抖处理：延迟500ms发送请求
            emailCheckTimeout = setTimeout(async () => {
                try {
                    const response = await fetch('/check_email', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: email })
                    });

                    const data = await response.json();

                    if (data.valid) {
                        emailStatus.textContent = data.message;
                        emailStatus.className = data.registered ? 
                            'email-status invalid' : 'email-status valid';

                        // 禁用/启用获取验证码按钮
                        const codeBtn = document.querySelector('#register-form .code-input button');
                        if (codeBtn) {
                            codeBtn.disabled = data.registered;
                        }
                    } else {
                        emailStatus.textContent = data.message;
                        emailStatus.className = 'email-status invalid';
                    }
                } catch (error) {
                    console.error('邮箱检查失败:', error);
                    emailStatus.textContent = '网络错误，请重试';
                    emailStatus.className = 'email-status invalid';
                } finally {
                    loadingSpinner.style.display = 'none';
                }
            }, 500);
        }

        // 吐司提示函数
        function showToast(message, type = 'success', duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            // 创建图标
            const icon = document.createElement('i');
            icon.className = `toast-icon fas ${
                type === 'success' ? 'fa-check-circle' : 
                type === 'error' ? 'fa-times-circle' : 
                'fa-exclamation-circle'
            }`;

            // 创建消息内容
            const content = document.createElement('span');
            content.textContent = message;

            // 创建关闭按钮
            const closeBtn = document.createElement('i');
            closeBtn.className = 'toast-close fas fa-times';
            closeBtn.onclick = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 500);
            };

            // 组装吐司
            toast.appendChild(icon);
            toast.appendChild(content);
            toast.appendChild(closeBtn);
            container.appendChild(toast);

            // 显示吐司
            setTimeout(() => toast.classList.add('show'), 10);

            // 自动隐藏
            if (duration > 0) {
                setTimeout(() => {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 500);
                }, duration);
            }

            return toast;
        }

        function switchTab(tabName) {
            // 隐藏所有表单
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('reset-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';

            // 移除所有按钮的active类
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => button.classList.remove('active'));

            // 显示选中的表单
            document.getElementById(`${tabName}-form`).style.display = 'block';

            // 为选中的按钮添加active类
            event.target.classList.add('active');
            
            // 滚动到顶部
            document.querySelector('.container').scrollTop = 0;
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const card = document.getElementById('login-card').value;

            if (!email || !password || !card) {
                showToast('请填写所有字段', 'error');
                return;
            }

            try {
                // 先验证卡密
                const cardResponse = await fetch('/verify_card', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        card: card
                    })
                });

                const cardData = await cardResponse.json();

                if (!cardData.success) {
                    showToast(cardData.message || '卡密验证失败', 'error');
                    return;
                }

                // 卡密验证成功后进行登录
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        card: card
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('登录成功！正在跳转...', 'success');
                    // 跳转到受保护的页面
                    window.location.href = data.redirect || '/dashboard';
                } else {
                    showToast(data.message || '登录失败', 'error');
                }
            } catch (error) {
                showToast('网络请求失败', 'error');
            }
        }

        async function register() {
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const code = document.getElementById('register-code').value;

            if (!password || password.length < 6) {
                showToast('密码长度至少6位', 'error');
                return;
            }
            if (!code || code.length !== 6) {
                showToast('请输入6位验证码', 'error');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        code: code
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('注册成功！正在跳转到登录页...', 'success');
                    setTimeout(() => switchTab('login'), 2000);
                } else {
                    showToast('注册失败：' + data.message, 'error');
                }
            } catch (error) {
                showToast('注册请求失败: ' + error.message, 'error');
            }
        }

        async function resetPassword() {
            const email = document.getElementById('reset-email').value.trim();
            const code = document.getElementById('reset-code').value.trim();
            const newPassword = document.getElementById('new-password').value.trim();

            if (!code || code.length !== 6) {
                showToast('请输入6位验证码', 'error');
                return;
            }
            if (!newPassword || newPassword.length < 6) {
                showToast('密码长度至少6位', 'error');
                return;
            }

            try {
                const response = await fetch('/reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        code: code,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('密码重置成功！正在跳转到登录页...', 'success');

                    // 清空表单
                    document.getElementById('reset-email').value = '';
                    document.getElementById('reset-code').value = '';
                    document.getElementById('new-password').value = '';

                    // 2秒后跳转到登录页
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    showToast('密码重置失败：' + data.message, 'error');
                }
            } catch (error) {
                showToast('网络请求失败: ' + error.message, 'error');
            }
        }

        async function sendCode(purpose) {
            const emailField = purpose === 'register' ? 'register-email' : 'reset-email';
            const email = document.getElementById(emailField).value.trim();
            const button = event.target;

            if (!email) {
                showToast('请输入邮箱地址', 'error');
                return;
            }

            button.disabled = true;
            const originalText = button.textContent;
            button.textContent = '发送中...';

            try {
                const response = await fetch('/send_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, purpose: purpose })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('验证码已发送到您的邮箱', 'success');

                    // 倒计时逻辑
                    let countdown = 60;
                    button.textContent = `${countdown}秒后重试`;
                    const timer = setInterval(() => {
                        countdown--;
                        button.textContent = `${countdown}秒后重试`;
                        if (countdown <= 0) {
                            clearInterval(timer);
                            button.textContent = '获取验证码';
                            button.disabled = false;
                        }
                    }, 1000);
                } else {
                    showToast(data.message || '验证码发送失败', 'error');
                    button.disabled = false;
                    button.textContent = originalText;
                }
            } catch (error) {
                showToast('网络请求失败', 'error');
                button.disabled = false;
                button.textContent = originalText;
            }
        }
    </script>
